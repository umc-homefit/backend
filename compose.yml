services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homefit}
      POSTGRES_USER: ${POSTGRES_USER:-homefit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-homefit} -d ${POSTGRES_DB:-homefit}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: runtime
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-homefit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-homefit}?schema=public
    command: ['npm', 'run', 'prisma:migrate:deploy']
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-homefit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-homefit}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-14d}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CRAWL_CRON: ${CRAWL_CRON:-0 6 * * *}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      LOAN_RATE_API_BASE_URL: ${LOAN_RATE_API_BASE_URL:-}
      LOAN_RATE_API_SERVICE_KEY: ${LOAN_RATE_API_SERVICE_KEY:-}
      LOAN_GUARANTEE_INFO_API_BASE_URL: ${LOAN_GUARANTEE_INFO_API_BASE_URL:-}
    ports:
      - '${API_HOST_PORT:-3000}:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const req=http.get('http://127.0.0.1:3000/api/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1)})",
        ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  postgres_data:
