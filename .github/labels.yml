# HomeFit 백엔드 라벨 정의
# GitHub에 자동 반영되는 파일은 아니며, label sync 도구 또는 gh 명령으로 적용한다.
# 이 파일은 GitHub에 실제 적용된 이모지 라벨과 동일하게 유지한다.

# --- 작업 유형 ---
- name: "✨ feature"
